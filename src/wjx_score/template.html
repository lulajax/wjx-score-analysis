<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{name}} - {{exam_name}}成绩单</title>
<style>
  :root {
    --c-primary: #6366f1;
    --c-primary-dark: #4f46e5;
    --c-primary-light: #eef2ff;
    --c-success: #10b981;
    --c-warning: #f59e0b;
    --c-danger: #ef4444;
    --c-text: #1e293b;
    --c-text-secondary: #64748b;
    --c-text-muted: #94a3b8;
    --c-border: #e2e8f0;
    --c-bg: #f8fafc;
    --c-card: #ffffff;
    --c-track: #f1f5f9;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-size: 13px;
  }
  @media print {
    body { background: white; margin: 0; padding: 0; }
    .page { box-shadow: none !important; padding: 10px 16px; max-width: 100%; }
    .page > * { page-break-inside: avoid; }
    .no-print { display: none !important; }
    @page { margin: 8mm 6mm; size: A4; }
  }
  .page {
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 24px;
    background: var(--c-card);
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
  }

  /* ── 头部横条 ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, var(--c-primary-dark), #7c3aed);
    color: white;
    padding: 14px 20px;
    border-radius: var(--radius);
    margin-bottom: 12px;
  }
  .header__brand { font-size: 11px; letter-spacing: 2px; font-weight: 600; opacity: .85; }
  .header__title { font-size: 18px; font-weight: 800; }
  .header__right { text-align: right; font-size: 12px; opacity: .85; line-height: 1.6; }

  /* ── 总分横条 ── */
  .score-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: var(--c-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
  }
  .score-bar__total {
    font-size: 32px;
    font-weight: 800;
    color: var(--c-primary);
    line-height: 1;
  }
  .score-bar__total span { font-size: 14px; color: var(--c-text-muted); font-weight: 400; }
  .score-bar__stats { display: flex; gap: 20px; font-size: 13px; color: var(--c-text-secondary); }

  /* ── 科目汇总横表 ── */
  .summary-section {
    background: var(--c-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .summary-section__title {
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    background: #f8fafc;
    border-bottom: 1px solid var(--c-border);
  }
  .summary-table { width: 100%; border-collapse: collapse; }
  .summary-table th, .summary-table td {
    padding: 6px 8px;
    text-align: center;
    font-size: 12px;
    border: 1px solid var(--c-border);
  }
  .summary-table th {
    background: var(--c-primary);
    color: white;
    font-weight: 600;
    font-size: 12px;
  }
  .summary-table th:first-child { background: #475569; width: 60px; }
  .summary-table td:first-child { font-weight: 600; background: #f8fafc; color: var(--c-text-secondary); }
  .summary-table tr:last-child td { font-weight: 700; }
  .rate-cell { font-weight: 700; }

  /* ── 图表区（雷达 + 柱状并排）── */
  .charts-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .chart-box {
    flex: 1;
    background: var(--c-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 8px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .chart-box__title {
    font-size: 12px;
    font-weight: 700;
    color: var(--c-text);
    margin-bottom: 4px;
    text-align: center;
  }
  /* 雷达图容器：SVG 和标签共享同一坐标系 */
  .radar-wrap { position: relative; width: 100%; max-width: 226px; margin: 0 auto; }
  .radar-wrap svg { display: block; width: 100%; }
  .radar-label {
    position: absolute;
    transform: translate(-50%, -50%);
    text-align: center;
    line-height: 1.3;
    white-space: nowrap;
  }
  .radar-label__name { display: block; font-size: 11px; color: #334155; }
  .radar-label__rate { display: block; font-size: 11px; font-weight: 600; color: #6366f1; }

  /* 柱状图 */
  .hbar { margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
  .hbar__label { width: 56px; font-size: 11px; text-align: right; color: var(--c-text-secondary); flex-shrink: 0; }
  .hbar__track { flex: 1; height: 18px; background: var(--c-track); border-radius: 4px; overflow: hidden; position: relative; }
  .hbar__fill { height: 100%; border-radius: 4px; min-width: 1px; position: relative; }
  .hbar__pct { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 600; color: white; text-shadow: 0 0 2px rgba(0,0,0,0.3); }
  .hbar__val { font-size: 11px; font-weight: 600; width: 32px; text-align: left; flex-shrink: 0; color: var(--c-text-secondary); }

  /* ── 细分横表 ── */
  .detail-section {
    background: var(--c-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .detail-section__title {
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    background: #f8fafc;
    border-bottom: 1px solid var(--c-border);
  }
  .detail-htable { width: 100%; border-collapse: collapse; }
  .detail-htable th, .detail-htable td {
    padding: 5px 6px;
    text-align: center;
    font-size: 11px;
    border: 1px solid var(--c-border);
  }
  .detail-htable thead tr:first-child th {
    background: var(--c-primary);
    color: white;
    font-weight: 600;
    font-size: 12px;
  }
  .detail-htable thead tr:nth-child(2) th {
    background: #eef2ff;
    color: var(--c-primary-dark);
    font-weight: 600;
    font-size: 11px;
  }
  .detail-htable td:first-child { font-weight: 600; background: #f8fafc; color: var(--c-text-secondary); width: 60px; }
  .detail-htable tr:last-child td { font-weight: 700; }

  /* ── AI 分析 ── */
  .ai-section {
    margin-bottom: 12px;
    padding: 14px 16px;
    background: linear-gradient(135deg, var(--c-primary-light), #faf5ff);
    border-radius: var(--radius);
    border: 1px solid #e0e7ff;
  }
  .ai-section__header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .ai-section__icon { font-size: 16px; }
  .ai-section__title { font-size: 14px; font-weight: 700; color: #4338ca; }
  .ai-section__body {
    font-size: 13px;
    line-height: 1.7;
    color: var(--c-text);
    white-space: pre-wrap;
  }

  /* ── 页脚 ── */
  .footer {
    text-align: center;
    padding: 12px 0;
    font-size: 11px;
    color: var(--c-text-muted);
  }

  /* ── 导出按钮 ── */
  .export-bar {
    text-align: center;
    padding: 16px 0 8px;
  }
  .export-btn {
    display: inline-block;
    padding: 8px 28px;
    background: linear-gradient(135deg, var(--c-primary-dark), #7c3aed);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .export-btn:hover { opacity: 0.9; }
  .export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="page">

  <!-- 头部 -->
  <div class="header">
    <div>
      <div class="header__brand">展鹏教育</div>
      <div class="header__title">{{name}} — {{exam_name}}成绩单</div>
    </div>
    <div class="header__right">
      &#x1f4c5; {{submit_time}}
    </div>
  </div>

  <!-- 总分横条 -->
  <div class="score-bar">
    <div class="score-bar__total">{{total_score}}<span> / {{total_questions}}</span></div>
    <div class="score-bar__stats">
      <span>答对 <b>{{total_correct}}</b> 题</span>
      <span>正确率 <b>{{overall_rate}}%</b></span>
    </div>
  </div>

  <!-- 科目汇总横表 -->
  <div class="summary-section">
    <div class="summary-section__title">科目成绩汇总</div>
    {{subject_cards}}
  </div>

  <!-- 雷达图 + 柱状图 -->
  <div class="charts-row">
    <div class="chart-box">
      <div class="chart-box__title">能力维度分析</div>
      {{radar_svg}}
    </div>
    <div class="chart-box">
      <div class="chart-box__title">各科答对数量</div>
      {{bar_chart}}
    </div>
  </div>

  <!-- 细分正确率横表 -->
  <div class="detail-section">
    <div class="detail-section__title">各题型正确率详情</div>
    {{detail_tables}}
  </div>

  <!-- AI 分析 -->
  {{ai_section}}

  <!-- 页脚 -->
  <div class="footer">展鹏教育 &#x2022; 成绩分析报告</div>

</div>

<div class="export-bar no-print">
  <button class="export-btn" onclick="exportImage()">导出图片</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
function exportImage() {
  var btn = document.querySelector('.export-btn');
  btn.disabled = true;
  btn.textContent = '导出中...';
  var page = document.querySelector('.page');
  html2canvas(page, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#ffffff'
  }).then(function(canvas) {
    var a = document.createElement('a');
    a.download = document.title + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    btn.disabled = false;
    btn.textContent = '导出图片';
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = '导出图片';
    alert('导出失败，请重试');
  });
}
</script>
</body>
</html>
